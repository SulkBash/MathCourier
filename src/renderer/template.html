<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="katex.min.css">
  <script src="katex.min.js"></script>
  <script src="contrib/mhchem.min.js"></script>
  <script src="contrib/auto-render.min.js"></script>
  <script id="render-config" type="application/json">{{renderConfig}}</script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      display: inline-block;
    }
    #card {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      margin: 10px;
    }
    #math {
      display: block;
    }
    #watermark {
      align-self: flex-end;
    }
  </style>
</head>
<body>
  <div id="card">
    <div id="math"></div>
    <div id="watermark"></div>
  </div>
  <script>
    let renderConfigCache = null;
    let plotlyLoadPromise = null;

    function getRenderConfig() {
      if (renderConfigCache) {
        return renderConfigCache;
      }

      const configElement = document.getElementById('render-config');
      if (!configElement) {
        renderConfigCache = {};
        return renderConfigCache;
      }

      try {
        renderConfigCache = JSON.parse(configElement.textContent);
      } catch (err) {
        console.error('Failed to parse render config:', err);
        renderConfigCache = {};
      }

      return renderConfigCache;
    }

    function applyTemplateStyle() {
      const renderConfig = getRenderConfig();
      const style = renderConfig.style || {};
      const watermark = style.watermark || {};
      const card = document.getElementById('card');
      const mathDiv = document.getElementById('math');
      const watermarkDiv = document.getElementById('watermark');

      card.style.backgroundColor = style.backgroundColor || 'transparent';
      card.style.color = style.textColor || '';
      card.style.fontFamily = style.fontFamily || '';
      card.style.fontSize = style.fontSize || '';
      card.style.padding = style.padding || '0';
      card.style.borderRadius = style.borderRadius || '0';
      card.style.border = style.border || 'none';
      card.style.boxShadow = style.boxShadow || 'none';

      mathDiv.style.marginBottom = watermark.text ? '12px' : '0';

      watermarkDiv.textContent = watermark.text || '';
      watermarkDiv.style.color = watermark.color || '';
      watermarkDiv.style.fontSize = watermark.fontSize || '';
      watermarkDiv.style.fontFamily = watermark.fontFamily || '';
    }

    function ensurePlotlyLoaded() {
      if (typeof Plotly !== 'undefined') {
        return Promise.resolve();
      }

      if (plotlyLoadPromise) {
        return plotlyLoadPromise;
      }

      const renderConfig = getRenderConfig();
      const plotlyScriptSrc = renderConfig.plotlyScriptSrc;
      if (!plotlyScriptSrc) {
        return Promise.reject(new Error('Plotly.js script source is not configured.'));
      }

      plotlyLoadPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = plotlyScriptSrc;
        script.charset = 'utf-8';
        script.onload = () => resolve();
        script.onerror = () => reject(new Error('Failed to load Plotly.js.'));
        document.head.appendChild(script);
      });

      return plotlyLoadPromise;
    }

    applyTemplateStyle();

    function interpolateColor(color1, color2, factor) {
      function parseColor(c) {
        if (c.startsWith('#')) {
          const hex = c.slice(1);
          if (hex.length === 3) {
            return [
              parseInt(hex[0] + hex[0], 16),
              parseInt(hex[1] + hex[1], 16),
              parseInt(hex[2] + hex[2], 16)
            ];
          }
          return [
            parseInt(hex.slice(0, 2), 16),
            parseInt(hex.slice(2, 4), 16),
            parseInt(hex.slice(4, 6), 16)
          ];
        }
        return [6, 182, 212];
      }
      const c1 = parseColor(color1);
      const c2 = parseColor(color2);
      const r = Math.round(c1[0] + factor * (c2[0] - c1[0]));
      const g = Math.round(c1[1] + factor * (c2[1] - c1[1]));
      const b = Math.round(c1[2] + factor * (c2[2] - c1[2]));
      return "rgb(" + r + ", " + g + ", " + b + ")";
    }

    function renderFormula(latex, isBlock) {
      const mathDiv = document.getElementById('math');
      try {
        katex.render(latex, mathDiv, {
          displayMode: isBlock,
          throwOnError: true,
          trust: false
        });
        return { success: true };
      } catch (err) {
        return { success: false, error: err.message };
      }
    }
    function renderMixedText(text) {
      const mathDiv = document.getElementById('math');
      try {
        mathDiv.textContent = text;
        renderMathInElement(mathDiv, {
          delimiters: [
            {left: "$$", right: "$$", display: true}
          ],
          throwOnError: false,
          trust: false
        });
        return { success: true };
      } catch (err) {
        return { success: false, error: err.message };
      }
    }
    function renderGraph(latex, type, data, options) {
      const mathDiv = document.getElementById('math');
      try {
        katex.render(latex, mathDiv, {
          displayMode: true,
          throwOnError: true,
          trust: false
        });

        let canvas = document.getElementById('graph-canvas');
        if (!canvas) {
          canvas = document.createElement('canvas');
          canvas.id = 'graph-canvas';
          canvas.style.marginTop = '16px';
          canvas.style.display = 'block';
          canvas.style.borderRadius = '8px';
          const watermarkDiv = document.getElementById('watermark');
          mathDiv.parentNode.insertBefore(canvas, watermarkDiv);
        }
        
        canvas.width = options.width || 600;
        canvas.height = options.height || 450;
        canvas.style.width = canvas.width + 'px';
        canvas.style.height = canvas.height + 'px';

        drawGraphOnCanvas(canvas, type, data, options);
        return { success: true };
      } catch (err) {
        return { success: false, error: err.message };
      }
    }

    function drawGraphOnCanvas(canvas, type, data, options) {
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      
      ctx.clearRect(0, 0, width, height);
      
      const xMin = options.xDomain[0];
      const xMax = options.xDomain[1];
      const yMin = options.yDomain[0];
      const yMax = options.yDomain[1];
      
      function toScreenX(x) {
        return ((x - xMin) / (xMax - xMin)) * width;
      }
      function toScreenY(y) {
        return height - ((y - yMin) / (yMax - yMin)) * height;
      }
      
      // Grid
      ctx.strokeStyle = options.gridColor || 'rgba(255, 255, 255, 0.06)';
      ctx.lineWidth = 1;
      
      function getGridStep(min, max) {
        const range = max - min;
        const roughStep = range / 8;
        const p10 = Math.pow(10, Math.floor(Math.log10(roughStep)));
        const ratio = roughStep / p10;
        if (ratio < 1.5) return p10;
        if (ratio < 3.5) return p10 * 2;
        if (ratio < 7.5) return p10 * 5;
        return p10 * 10;
      }
      
      const xStep = getGridStep(xMin, xMax);
      const yStep = getGridStep(yMin, yMax);
      
      const startX = Math.ceil(xMin / xStep) * xStep;
      for (let x = startX; x <= xMax; x += xStep) {
        if (Math.abs(x) < 1e-10) continue;
        ctx.beginPath();
        ctx.moveTo(toScreenX(x), 0);
        ctx.lineTo(toScreenX(x), height);
        ctx.stroke();
      }
      
      const startY = Math.ceil(yMin / yStep) * yStep;
      for (let y = startY; y <= yMax; y += yStep) {
        if (Math.abs(y) < 1e-10) continue;
        ctx.beginPath();
        ctx.moveTo(0, toScreenY(y));
        ctx.lineTo(width, toScreenY(y));
        ctx.stroke();
      }
      
      // Axes
      ctx.strokeStyle = options.axisColor || 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 2;
      
      const screenX0 = toScreenX(0);
      const screenY0 = toScreenY(0);
      
      ctx.beginPath();
      ctx.moveTo(0, screenY0);
      ctx.lineTo(width, screenY0);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(screenX0, 0);
      ctx.lineTo(screenX0, height);
      ctx.stroke();
      
      // Tick labels
      ctx.fillStyle = options.axisLabelColor || 'rgba(248, 250, 252, 0.5)';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      
      for (let x = startX; x <= xMax; x += xStep) {
        const sx = toScreenX(x);
        ctx.beginPath();
        ctx.moveTo(sx, screenY0 - 4);
        ctx.lineTo(sx, screenY0 + 4);
        ctx.stroke();
        
        const labelY = screenY0 + 6 > height - 15 ? screenY0 - 18 : screenY0 + 6;
        const label = Number(x.toFixed(10)).toString();
        ctx.fillText(label, sx, labelY);
      }
      
      ctx.textAlign = screenX0 - 6 < 15 ? 'left' : 'right';
      ctx.textBaseline = 'middle';
      for (let y = startY; y <= yMax; y += yStep) {
        if (Math.abs(y) < 1e-10) continue;
        const sy = toScreenY(y);
        ctx.beginPath();
        ctx.moveTo(screenX0 - 4, sy);
        ctx.lineTo(screenX0 + 4, sy);
        ctx.stroke();
        
        const labelX = screenX0 - 6 < 15 ? screenX0 + 8 : screenX0 - 6;
        const label = Number(y.toFixed(10)).toString();
        ctx.fillText(label, labelX, sy);
      }
      
      if (screenX0 >= 0 && screenX0 <= width && screenY0 >= 0 && screenY0 <= height) {
        ctx.fillText('0', screenX0 - 6 < 15 ? screenX0 + 8 : screenX0 - 6, screenY0 + 6);
      }
      
      // Curve
      ctx.save();
      ctx.lineWidth = options.lineWidth || 3.5;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      
      ctx.shadowColor = options.glowColor || 'rgba(6, 182, 212, 0.4)';
      ctx.shadowBlur = options.glowBlur || 10;
      
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      const colors = options.curveColors || ['#06b6d4', '#8b5cf6'];
      gradient.addColorStop(0, colors[0]);
      gradient.addColorStop(1, colors[1]);
      ctx.strokeStyle = gradient;
      
      if (type === 'explicit') {
        let isDrawing = false;
        ctx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const pt = data[i];
          if (pt.y === null || isNaN(pt.y) || !isFinite(pt.y)) {
            isDrawing = false;
            continue;
          }
          
          const sx = toScreenX(pt.x);
          const sy = toScreenY(pt.y);
          const oob = sy < -height || sy > height * 2 || sx < -width || sx > width * 2;
          
          if (!isDrawing) {
            if (!oob) {
              if (i > 0 && data[i-1].y !== null && !isNaN(data[i-1].y) && isFinite(data[i-1].y)) {
                const prev = data[i-1];
                ctx.moveTo(toScreenX(prev.x), toScreenY(prev.y));
                ctx.lineTo(sx, sy);
              } else {
                ctx.moveTo(sx, sy);
              }
              isDrawing = true;
            }
          } else {
            ctx.lineTo(sx, sy);
            if (oob) isDrawing = false;
          }
        }
        ctx.stroke();
        
        // Fill under curve
        ctx.restore();
        ctx.save();
        const fillGradient = ctx.createLinearGradient(0, 0, 0, height);
        fillGradient.addColorStop(0, colors[0] + '22');
        fillGradient.addColorStop(1, 'transparent');
        ctx.fillStyle = fillGradient;
        
        let pathStarted = false;
        for (let i = 0; i < data.length; i++) {
          const pt = data[i];
          const ok = pt.y !== null && !isNaN(pt.y) && isFinite(pt.y);
          if (ok) {
            if (!pathStarted) {
              ctx.beginPath();
              ctx.moveTo(toScreenX(pt.x), toScreenY(0));
              ctx.lineTo(toScreenX(pt.x), toScreenY(pt.y));
              pathStarted = true;
            } else {
              ctx.lineTo(toScreenX(pt.x), toScreenY(pt.y));
            }
          }
          
          if (pathStarted && (!ok || i === data.length - 1)) {
            const last = data[ok ? i : i - 1];
            ctx.lineTo(toScreenX(last.x), toScreenY(0));
            ctx.closePath();
            ctx.fill();
            pathStarted = false;
          }
        }
        
      } else if (type === 'parametric' || type === 'polar') {
        let isDrawing = false;
        ctx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const pt = data[i];
          if (pt.y === null || isNaN(pt.y) || !isFinite(pt.y) || pt.x === null || isNaN(pt.x) || !isFinite(pt.x)) {
            isDrawing = false;
            continue;
          }
          
          const sx = toScreenX(pt.x);
          const sy = toScreenY(pt.y);
          const oob = sy < -height || sy > height * 2 || sx < -width || sx > width * 2;
          
          if (!isDrawing) {
            if (!oob) {
              if (i > 0 && data[i-1].y !== null && !isNaN(data[i-1].y) && isFinite(data[i-1].y) && data[i-1].x !== null && !isNaN(data[i-1].x) && isFinite(data[i-1].x)) {
                const prev = data[i-1];
                ctx.moveTo(toScreenX(prev.x), toScreenY(prev.y));
                ctx.lineTo(sx, sy);
              } else {
                ctx.moveTo(sx, sy);
              }
              isDrawing = true;
            }
          } else {
            ctx.lineTo(sx, sy);
            if (oob) isDrawing = false;
          }
        }
        ctx.stroke();

      } else if (type === 'implicit') {
        const X = data.X;
        const Y = data.Y;
        const V = data.V;
        const N = X.length;
        const M = Y.length;
        
        ctx.beginPath();
        for (let i = 0; i < N - 1; i++) {
          for (let j = 0; j < M - 1; j++) {
            const v00 = V[i][j];
            const v10 = V[i+1][j];
            const v11 = V[i+1][j+1];
            const v01 = V[i][j+1];
            
            if (isNaN(v00) || isNaN(v10) || isNaN(v11) || isNaN(v01) ||
                !isFinite(v00) || !isFinite(v10) || !isFinite(v11) || !isFinite(v01)) {
              continue;
            }
            
            // marching squares: find zero-crossings on cell edges
            const crossings = [];
            if (v00 * v10 <= 0 && v00 !== v10) {
              const t = -v00 / (v10 - v00);
              crossings.push({ x: X[i] + t * (X[i+1] - X[i]), y: Y[j] });
            }
            if (v10 * v11 <= 0 && v10 !== v11) {
              const t = -v10 / (v11 - v10);
              crossings.push({ x: X[i+1], y: Y[j] + t * (Y[j+1] - Y[j]) });
            }
            if (v01 * v11 <= 0 && v01 !== v11) {
              const t = -v01 / (v11 - v01);
              crossings.push({ x: X[i] + t * (X[i+1] - X[i]), y: Y[j+1] });
            }
            if (v00 * v01 <= 0 && v00 !== v01) {
              const t = -v00 / (v01 - v00);
              crossings.push({ x: X[i], y: Y[j] + t * (Y[j+1] - Y[j]) });
            }
            
            if (crossings.length === 2) {
              ctx.moveTo(toScreenX(crossings[0].x), toScreenY(crossings[0].y));
              ctx.lineTo(toScreenX(crossings[1].x), toScreenY(crossings[1].y));
            } else if (crossings.length === 4) {
              ctx.moveTo(toScreenX(crossings[0].x), toScreenY(crossings[0].y));
              ctx.lineTo(toScreenX(crossings[1].x), toScreenY(crossings[1].y));
              ctx.moveTo(toScreenX(crossings[2].x), toScreenY(crossings[2].y));
              ctx.lineTo(toScreenX(crossings[3].x), toScreenY(crossings[3].y));
            }
          }
        }
        ctx.stroke();
      } else if (type === 'vector') {
        const points = data.points;
        const scale = data.scale;
        
        ctx.save();
        ctx.lineWidth = options.lineWidth || 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        
        const colors = options.curveColors || ['#06b6d4', '#8b5cf6'];
        
        points.forEach(pt => {
          if (isNaN(pt.u) || pt.u === null || isNaN(pt.v) || pt.v === null || !isFinite(pt.u) || !isFinite(pt.v)) {
            return;
          }
          
          const magnitude = Math.sqrt(pt.u * pt.u + pt.v * pt.v);
          if (magnitude < 1e-8) return;
          
          const sx = toScreenX(pt.x);
          const sy = toScreenY(pt.y);
          
          const ex = toScreenX(pt.x + pt.u * scale);
          const ey = toScreenY(pt.y + pt.v * scale);
          
          let ratio = pt.norm;
          if (ratio > 1) ratio = 1;
          if (ratio < 0) ratio = 0;
          
          ctx.strokeStyle = interpolateColor(colors[0], colors[1], ratio);
          
          const dx = ex - sx;
          const dy = ey - sy;
          const pixelLen = Math.sqrt(dx * dx + dy * dy);
          const headLen = options.arrowHeadLength || 10;
          
          if (pixelLen > headLen) {
            const angle = Math.atan2(dy, dx);
            const shaftEndX = ex - headLen * Math.cos(angle);
            const shaftEndY = ey - headLen * Math.sin(angle);
            
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(shaftEndX, shaftEndY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex - headLen * Math.cos(angle - Math.PI / 6), ey - headLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(ex - headLen * Math.cos(angle + Math.PI / 6), ey - headLen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();
          } else {
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.stroke();
          }
        });
        ctx.restore();
      } else if (type === 'ode_curves') {
        const curveKeys = Object.keys(data);
        const curveColors = options.curveColors || ['#06b6d4', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#84cc16'];
        
        curveKeys.forEach((key, idx) => {
          const points = data[key];
          const color = curveColors[idx % curveColors.length];
          
          ctx.save();
          ctx.strokeStyle = color;
          ctx.lineWidth = options.lineWidth || 3.5;
          ctx.lineJoin = 'round';
          ctx.lineCap = 'round';
          
          ctx.shadowColor = color + '66';
          ctx.shadowBlur = options.glowBlur || 10;
          
          let isDrawing = false;
          ctx.beginPath();
          for (let i = 0; i < points.length; i++) {
            const pt = points[i];
            if (pt.y === null || isNaN(pt.y) || !isFinite(pt.y)) {
              isDrawing = false;
              continue;
            }
            
            const sx = toScreenX(pt.x);
            const sy = toScreenY(pt.y);
            const oob = sy < -height || sy > height * 2 || sx < -width || sx > width * 2;
            
            if (!isDrawing) {
              if (!oob) {
                if (i > 0 && points[i-1].y !== null && !isNaN(points[i-1].y) && isFinite(points[i-1].y)) {
                  const prev = points[i-1];
                  ctx.moveTo(toScreenX(prev.x), toScreenY(prev.y));
                  ctx.lineTo(sx, sy);
                } else {
                  ctx.moveTo(sx, sy);
                }
                isDrawing = true;
              }
            } else {
              ctx.lineTo(sx, sy);
              if (oob) isDrawing = false;
            }
          }
          ctx.stroke();
          ctx.restore();
        });
        
        // Draw Legend
        if (curveKeys.length > 1) {
          ctx.save();
          ctx.font = '14px sans-serif';
          ctx.textBaseline = 'middle';
          let legendX = width - 90;
          let legendY = 25;
          
          curveKeys.forEach((key, idx) => {
            const color = curveColors[idx % curveColors.length];
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(legendX, legendY, 5, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.fillStyle = options.axisLabelColor || 'rgba(248, 250, 252, 0.7)';
            ctx.fillText(key, legendX + 10, legendY);
            legendY += 20;
          });
          ctx.restore();
        }
      } else if (type === 'multi') {
        const curveColors = options.curveColors || ['#06b6d4', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#84cc16'];
        
        data.forEach((plot, idx) => {
          const color = curveColors[idx % curveColors.length];
          ctx.save();
          
          if (plot.type === 'explicit' || plot.type === 'parametric' || plot.type === 'polar') {
            ctx.strokeStyle = color;
            ctx.lineWidth = options.lineWidth || 3.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            
            ctx.shadowColor = color + '66';
            ctx.shadowBlur = options.glowBlur || 10;
            
            let isDrawing = false;
            ctx.beginPath();
            const points = plot.data;
            for (let i = 0; i < points.length; i++) {
              const pt = points[i];
              if (pt.y === null || isNaN(pt.y) || !isFinite(pt.y) || pt.x === null || isNaN(pt.x) || !isFinite(pt.x)) {
                isDrawing = false;
                continue;
              }
              
              const sx = toScreenX(pt.x);
              const sy = toScreenY(pt.y);
              const oob = sy < -height || sy > height * 2 || sx < -width || sx > width * 2;
              
              if (!isDrawing) {
                if (!oob) {
                  if (i > 0 && points[i-1].y !== null && !isNaN(points[i-1].y) && isFinite(points[i-1].y) && points[i-1].x !== null && !isNaN(points[i-1].x) && isFinite(points[i-1].x)) {
                    const prev = points[i-1];
                    ctx.moveTo(toScreenX(prev.x), toScreenY(prev.y));
                    ctx.lineTo(sx, sy);
                  } else {
                    ctx.moveTo(sx, sy);
                  }
                  isDrawing = true;
                }
              } else {
                ctx.lineTo(sx, sy);
                if (oob) isDrawing = false;
              }
            }
            ctx.stroke();
          } else if (plot.type === 'implicit') {
            const X = plot.data.X;
            const Y = plot.data.Y;
            const V = plot.data.V;
            const N = X.length;
            const M = Y.length;
            
            ctx.strokeStyle = color;
            ctx.lineWidth = options.lineWidth || 3.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            
            ctx.shadowColor = color + '66';
            ctx.shadowBlur = options.glowBlur || 10;
            
            ctx.beginPath();
            for (let i = 0; i < N - 1; i++) {
              for (let j = 0; j < M - 1; j++) {
                const v00 = V[i][j];
                const v10 = V[i+1][j];
                const v11 = V[i+1][j+1];
                const v01 = V[i][j+1];
                
                if (isNaN(v00) || isNaN(v10) || isNaN(v11) || isNaN(v01) ||
                    !isFinite(v00) || !isFinite(v10) || !isFinite(v11) || !isFinite(v01)) {
                  continue;
                }
                
                const crossings = [];
                if (v00 * v10 <= 0 && v00 !== v10) {
                  const t = -v00 / (v10 - v00);
                  crossings.push({ x: X[i] + t * (X[i+1] - X[i]), y: Y[j] });
                }
                if (v10 * v11 <= 0 && v10 !== v11) {
                  const t = -v10 / (v11 - v10);
                  crossings.push({ x: X[i+1], y: Y[j] + t * (Y[j+1] - Y[j]) });
                }
                if (v01 * v11 <= 0 && v01 !== v11) {
                  const t = -v01 / (v11 - v01);
                  crossings.push({ x: X[i] + t * (X[i+1] - X[i]), y: Y[j+1] });
                }
                if (v00 * v01 <= 0 && v00 !== v01) {
                  const t = -v00 / (v01 - v00);
                  crossings.push({ x: X[i], y: Y[j] + t * (Y[j+1] - Y[j]) });
                }
                
                if (crossings.length === 2) {
                  ctx.moveTo(toScreenX(crossings[0].x), toScreenY(crossings[0].y));
                  ctx.lineTo(toScreenX(crossings[1].x), toScreenY(crossings[1].y));
                } else if (crossings.length === 4) {
                  ctx.moveTo(toScreenX(crossings[0].x), toScreenY(crossings[0].y));
                  ctx.lineTo(toScreenX(crossings[1].x), toScreenY(crossings[1].y));
                  ctx.moveTo(toScreenX(crossings[2].x), toScreenY(crossings[2].y));
                  ctx.lineTo(toScreenX(crossings[3].x), toScreenY(crossings[3].y));
                }
              }
            }
            ctx.stroke();
          } else if (plot.type === 'vector') {
            const points = plot.data.points;
            const scale = plot.data.scale;
            
            ctx.lineWidth = options.lineWidth || 2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            
            points.forEach(pt => {
              if (isNaN(pt.u) || pt.u === null || isNaN(pt.v) || pt.v === null || !isFinite(pt.u) || !isFinite(pt.v)) {
                return;
              }
              
              const magnitude = Math.sqrt(pt.u * pt.u + pt.v * pt.v);
              if (magnitude < 1e-8) return;
              
              const sx = toScreenX(pt.x);
              const sy = toScreenY(pt.y);
              
              const ex = toScreenX(pt.x + pt.u * scale);
              const ey = toScreenY(pt.y + pt.v * scale);
              
              ctx.strokeStyle = color;
              
              const dx = ex - sx;
              const dy = ey - sy;
              const pixelLen = Math.sqrt(dx * dx + dy * dy);
              const headLen = options.arrowHeadLength || 10;
              
              if (pixelLen > headLen) {
                const angle = Math.atan2(dy, dx);
                const shaftEndX = ex - headLen * Math.cos(angle);
                const shaftEndY = ey - headLen * Math.sin(angle);
                
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(shaftEndX, shaftEndY);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(ex, ey);
                ctx.lineTo(ex - headLen * Math.cos(angle - Math.PI / 6), ey - headLen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(ex - headLen * Math.cos(angle + Math.PI / 6), ey - headLen * Math.sin(angle + Math.PI / 6));
                ctx.closePath();
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fill();
              } else {
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(ex, ey);
                ctx.stroke();
              }
            });
          }
          ctx.restore();
        });
        
        // Draw Legend
        if (data.length > 1) {
          ctx.save();
          ctx.font = '14px sans-serif';
          ctx.textBaseline = 'middle';
          let legendX = width - 150;
          let legendY = 25;
          
          data.forEach((plot, idx) => {
            const color = curveColors[idx % curveColors.length];
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(legendX, legendY, 5, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.fillStyle = options.axisLabelColor || 'rgba(248, 250, 252, 0.7)';
            let label = plot.label || '';
            if (label.length > 18) label = label.slice(0, 16) + '...';
            ctx.fillText(label, legendX + 10, legendY);
            legendY += 20;
          });
          ctx.restore();
        }
      }
      ctx.restore();
    }

    async function renderGraph3d(latex, type, data, options) {
      const mathDiv = document.getElementById('math');
      try {
        await ensurePlotlyLoaded();

        if (latex) {
          katex.render(latex, mathDiv, {
            displayMode: true,
            throwOnError: true,
            trust: false
          });
        } else {
          mathDiv.innerHTML = '';
        }

        // Remove 2D canvas if it exists
        const canvas = document.getElementById('graph-canvas');
        if (canvas) canvas.remove();

        // Create or get Plotly container
        let container = document.getElementById('plotly-graph');
        if (!container) {
          container = document.createElement('div');
          container.id = 'plotly-graph';
          container.style.margin = '16px auto 0 auto';
          container.style.display = 'block';
          container.style.borderRadius = '8px';
          const watermarkDiv = document.getElementById('watermark');
          mathDiv.parentNode.insertBefore(container, watermarkDiv);
        }

        const baseWidth = options.width || 600;
        const renderWidth = baseWidth + Math.max(48, Math.round(baseWidth * 0.12));
        const renderOptions = Object.assign({}, options, { renderWidth });

        container.style.width = renderWidth + 'px';
        container.style.height = (options.height || 450) + 'px';

        await drawGraph3d(container, type, data, renderOptions);
        return { success: true };
      } catch (err) {
        return { success: false, error: err.message };
      }
    }

    function get3dGridStep(domain) {
      if (!domain || !Array.isArray(domain) || domain.length < 2) return 1;
      const range = Math.abs(domain[1] - domain[0]);
      if (!range || !isFinite(range)) return 1;

      const roughStep = range / 6;
      const p10 = Math.pow(10, Math.floor(Math.log10(roughStep)));
      const ratio = roughStep / p10;

      if (ratio < 1.5) return p10;
      if (ratio < 3.5) return p10 * 2;
      if (ratio < 7.5) return p10 * 5;
      return p10 * 10;
    }

    function build3dAxisLayout(domain, options) {
      const tickSize = Math.max(10, Math.round(Math.min(options.renderWidth || options.width || 600, options.height || 450) * 0.018));
      return {
        gridcolor: options.gridColor || 'rgba(255, 255, 255, 0.08)',
        color: options.axisLabelColor || 'rgba(248, 250, 252, 0.8)',
        backgroundcolor: 'transparent',
        showbackground: false,
        zerolinecolor: options.axisColor || 'rgba(255, 255, 255, 0.3)',
        range: domain,
        tickfont: {
          size: tickSize,
          color: options.axisLabelColor || 'rgba(248, 250, 252, 0.8)'
        },
        tickmode: 'linear',
        tick0: 0,
        dtick: get3dGridStep(domain)
      };
    }

    function drawGraph3d(container, type, data, options) {
      if (typeof Plotly === 'undefined') {
        throw new Error('Plotly.js is not loaded.');
      }

      const width = options.renderWidth || options.width || 600;
      const height = options.height || 450;
      const sceneInsetLeft = Math.max(0.06, 42 / width);
      const sceneInsetRight = Math.max(0.015, 10 / width);
      const sceneInsetBottom = Math.max(0.055, 28 / height);
      const sceneInsetTop = Math.max(0.02, 10 / height);

      let trace;
      if (type === 'surface') {
        trace = {
          type: 'surface',
          x: data.x,
          y: data.y,
          z: data.z,
          colorscale: options.colorscale || 'Viridis',
          showscale: false
        };
      } else if (type === 'implicit') {
        trace = {
          type: 'isosurface',
          x: data.x,
          y: data.y,
          z: data.z,
          value: data.value,
          isomin: 0,
          isomax: 0,
          colorscale: options.colorscale || 'Viridis',
          showscale: false,
          caps: {
            x: { show: false },
            y: { show: false },
            z: { show: false }
          }
        };
      } else if (type === 'curve') {
        trace = {
          type: 'scatter3d',
          mode: 'lines',
          x: data.x,
          y: data.y,
          z: data.z,
          line: {
            width: options.lineWidth || 6,
            color: options.curveColors ? options.curveColors[0] : '#06b6d4'
          }
        };
      } else if (type === 'flux3d') {
        const dx = Math.abs((options.xDomain && options.xDomain[1] - options.xDomain[0]) || 8);
        const dy = Math.abs((options.yDomain && options.yDomain[1] - options.yDomain[0]) || 8);
        const dz = Math.abs((options.zDomain && options.zDomain[1] - options.zDomain[0]) || 8);
        const avgSpan = (dx + dy + dz) / 3;
        const sizeRef = avgSpan * 0.04; // 4% of coordinate box span for arrowhead size

        trace = [
          {
            type: 'scatter3d',
            mode: 'lines',
            x: data.x,
            y: data.y,
            z: data.z,
            line: {
              width: options.lineWidth || 4,
              color: data.color,
              colorscale: options.colorscale || 'Viridis',
              showscale: false,
              cmin: 0,
              cmax: 1
            }
          },
          {
            type: 'cone',
            x: data.coneX,
            y: data.coneY,
            z: data.coneZ,
            u: data.coneU,
            v: data.coneV,
            w: data.coneW,
            colorscale: options.colorscale || 'Viridis',
            cmin: 0,
            cmax: 1,
            showscale: false,
            sizemode: 'absolute',
            sizeref: sizeRef,
            anchor: 'center',
            opacity: 1.0,
            hoverinfo: 'skip'
          }
        ];
      } else if (type === 'vector3d') {
        trace = {
          type: 'cone',
          x: data.x,
          y: data.y,
          z: data.z,
          u: data.u,
          v: data.v,
          w: data.w,
          colorscale: options.colorscale || 'Viridis',
          showscale: false,
          sizemode: 'scaled',
          sizeref: 0.4,
          anchor: 'tail',
          opacity: 0.9,
          hoverinfo: 'skip'
        };
      } else {
        throw new Error('Unknown 3D plot type: ' + type);
      }

      const layout = {
        width,
        height,
        margin: { l: 0, r: 0, b: 0, t: 0 },
        paper_bgcolor: 'transparent',
        plot_bgcolor: 'transparent',
        showlegend: false,
        scene: {
          domain: {
            x: [sceneInsetLeft, 1 - sceneInsetRight],
            y: [sceneInsetBottom, 1 - sceneInsetTop]
          },
          aspectmode: options.aspectmode || (type === 'vector3d' ? 'cube' : 'auto'),
          aspectratio: options.aspectratio,
          xaxis: build3dAxisLayout(options.xDomain, options),
          yaxis: build3dAxisLayout(options.yDomain, options),
          zaxis: build3dAxisLayout(options.zDomain, options),
          camera: options.camera || {
            eye: { x: 1.5, y: 1.5, z: 1.25 },
            up: { x: 0, y: 0, z: 1 },
            center: { x: 0, y: 0, z: 0 }
          }
        }
      };

      const traces = Array.isArray(trace) ? trace : [trace];
      return Plotly.newPlot(container, traces, layout, { displayModeBar: false });
    }
  </script>
