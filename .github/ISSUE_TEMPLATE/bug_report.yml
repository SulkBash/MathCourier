name: Bug report
description: Report a reproducible problem in the documented bot behavior or tooling.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Please use the security policy instead of this form for vulnerabilities, secrets exposure, SSRF concerns, or anything that should not be public.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which public surface or subsystem is closest to the issue?
      options:
        - !latex
        - !plot
        - !solve
        - !help
        - setup / doctor
        - renderer / puppeteer
        - CI / GitHub automation
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the exact command, options, and any setup needed to reproduce.
      placeholder: |
        1. Run ...
        2. Send command ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: services
    attributes:
      label: External services involved
      description: Check any service that may have been used in the failing path.
      options:
        - label: QuickLaTeX
        - label: CodeCogs
        - label: None / local rendering only
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node, Python, browser path details, and `ffmpeg` details when relevant.
      placeholder: |
        OS:
        Node:
        Python:
        Browser:
        ffmpeg:
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics and logs
      description: Paste `npm run doctor` output and any relevant logs. Remove secrets, QR codes, auth data, and private chat content.
      render: shell
