name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} Release Gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    env:
      # Keep the app's Python subprocess bridge aligned with actions/setup-python.
      PYTHON_BIN: python
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      # Official GitHub-maintained actions are intentionally constrained to
      # explicit major versions and tracked by Dependabot in .github/dependabot.yml.
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress

      - name: Ensure Chocolatey tools are on PATH
        if: runner.os == 'Windows'
        run: |
          "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Linux browser/runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1
          sudo apt-get install -y --no-install-recommends libasound2 || sudo apt-get install -y --no-install-recommends libasound2t64

      - name: Install ffmpeg on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: brew install ffmpeg

      - name: Show tool versions on Windows
        if: runner.os == 'Windows'
        run: |
          node --version
          npm --version
          python --version
          ffmpeg -version | Select-Object -First 1

      - name: Show tool versions on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          node --version
          npm --version
          python --version
          ffmpeg -version | head -n 1

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install sympy numpy scipy

      - name: Run setup check
        run: npm run doctor

      - name: Run startup smoke check
        run: npm run test:startup

      - name: Run canonical CI release gate
        run: npm run test:ci

      - name: Upload renderer artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-test-output
          path: |
            test_output
            runtime_cache
          if-no-files-found: ignore
