name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Windows Release Gate
    runs-on: windows-latest
    timeout-minutes: 75

    steps:
      # Official GitHub-maintained actions are intentionally constrained to
      # explicit major versions and tracked by Dependabot in .github/dependabot.yml.
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: choco install ffmpeg -y --no-progress

      - name: Ensure Chocolatey tools are on PATH
        run: |
          "$env:ChocolateyInstall\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show tool versions
        run: |
          node --version
          npm --version
          python --version
          ffmpeg -version | Select-Object -First 1

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install sympy numpy scipy

      - name: Run setup check
        run: npm run doctor

      - name: Run canonical CI release gate
        run: npm run test:ci

      - name: Upload renderer artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-output
          path: |
            test_output
            runtime_cache
          if-no-files-found: ignore
